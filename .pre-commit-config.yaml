default_language_version:
  python: python3.14
fail_fast: false
minimum_pre_commit_version: 4.1.0
repos:
- hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
    args: [--allow-multiple-documents]
    exclude: ^\.github/ISSUE_TEMPLATE/
  - id: check-toml
  - id: debug-statements
  - id: check-merge-conflict
  - id: detect-private-key
  repo: https://github.com/pre-commit/pre-commit-hooks
  rev: b89c5eef3ba3a74ecd506d968e63a8b80f697abf
- hooks:
  - args:
    - --fix
    id: ruff
  - id: ruff-format
  repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.11
- hooks:
  - id: python-print-detection
  - id: python-pprint-detection
  - id: python-unreachable-code
  - id: yaml-sorter
    exclude: ^(\.github/ISSUE_TEMPLATE/|\.github/workflows/|\.pre-commit-config\.yaml)
  repo: https://github.com/chrysa/pre-commit-tools
  rev: e538371cdb5dff59d3b67ef5e63dae3dce8bfc37
