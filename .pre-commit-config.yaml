default_language_version:
  python: python3.14
fail_fast: false
minimum_pre_commit_version: 4.1.0
repos:
- hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-toml
  - id: debug-statements
  - id: check-merge-conflict
  repo: https://github.com/pre-commit/pre-commit-hooks
  rev: f1dff44d3a9ae852957f34def96390f28719c232
- hooks:
  - args:
    - --fix
    id: ruff
  - id: ruff-format
  repo: https://github.com/astral-sh/ruff-pre-commit
  rev: c53b915162b475dfc95c73f94219e6f87ace2fca
- hooks:
  - id: python-print-detection
  - id: python-pprint-detection
  - id: python-unreachable-code
  - id: yaml-sorter
    exclude: ^\.github/workflows/
  repo: https://github.com/chrysa/pre-commit-tools
  rev: b97ae91d8a45eb6f556fe938fa8bd58294c9a5e6
