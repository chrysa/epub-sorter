branches:
    feat:
        increment: Minor
        label: alpha
        regex: ^feat[/-]
        source-branches:
            - main
    fix:
        increment: Patch
        label: fix
        regex: ^fix[/-]
        source-branches:
            - main
    release:
        increment: Patch
        label: rc
        regex: ^release[/-]
        source-branches:
            - main
workflow: GitHubFlow/v1
