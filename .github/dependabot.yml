updates:
- assignees:
  - chrysa
  commit-message:
    prefix: '[SKIP CI] [GA] '
  cooldown:
    default-days: 7
  directory: .github/workflows/
  groups:
    actions-official:
      patterns:
      - actions/*
    community-actions:
      patterns:
      - '*'
    peter-evans:
      patterns:
      - peter-evans/*
  labels:
  - skip-ci
  - dependencies
  - Ci
  open-pull-requests-limit: 8
  package-ecosystem: github-actions
  reviewers:
  - chrysa
  schedule:
    cronjob: 0 4 * * 5
    interval: cron
- assignees:
  - chrysa
  commit-message:
    prefix: '[SKIP CI] [pre-commit] '
  directory: /
  labels:
  - skip-ci
  - dependencies
  - Pre-commit
  open-pull-requests-limit: 2
  package-ecosystem: pre-commit
  reviewers:
  - chrysa
  schedule:
    cronjob: 0 4 * * 5
    interval: cron
- assignees:
  - chrysa
  commit-message:
    prefix: '[pip] '
  cooldown:
    default-days: 7
  directory: /
  groups:
    linters:
      patterns:
      - ruff*
      - black*
      - flake8*
    testing:
      patterns:
      - pytest*
      - faker
      - mock
      - coverage*
    typing-stubs:
      patterns:
      - mypy*
      - types-*
  labels:
  - dependencies
  - Python
  open-pull-requests-limit: 10
  package-ecosystem: pip
  reviewers:
  - chrysa
  schedule:
    cronjob: 0 4 * * 5
    interval: cron
version: 2
