updates:
- commit-message:
    prefix: ci(deps)
  directory: /
  labels:
  - dependencies
  open-pull-requests-limit: 5
  package-ecosystem: github-actions
  schedule:
    day: monday
    interval: weekly
- commit-message:
    prefix: chore(deps)
  directory: /
  labels:
  - dependencies
  open-pull-requests-limit: 5
  package-ecosystem: pip
  schedule:
    day: monday
    interval: weekly
- commit-message:
    prefix: chore(deps)
  directory: /
  labels:
  - dependencies
  open-pull-requests-limit: 5
  package-ecosystem: pre-commit
  schedule:
    day: monday
    interval: weekly
version: 2
