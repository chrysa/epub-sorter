---
name: CI

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main
            - "feat/**"
            - "chore/**"
            - "ci/**"
            - "feature/**"
            - "fix/**"
    workflow_dispatch:

permissions:
    checks: write
    contents: read
    pull-requests: write
    statuses: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    pre-commit:
        name: Pre-commit checks
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.14"
                  cache: pip

            - uses: pre-commit/action@v3.0.1

    ruff:
        name: Ruff lint
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.14"
                  cache: pip

            - name: Install ruff
              run: pip install ruff

            - name: Run ruff check
              run: ruff check .

            - name: Run ruff format check
              run: ruff format --check .

    build:
        name: Build Windows executable
        runs-on: windows-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Build with PyInstaller
              run: pyinstaller --onefile --noconsole main.py --name epub-sorter

            - uses: actions/upload-artifact@v7
              with:
                  name: epub-sorter-windows
                  path: dist/epub-sorter.exe
                  retention-days: 7
