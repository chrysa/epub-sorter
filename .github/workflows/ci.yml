---
name: CI

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main
            - "feat/**"
            - "chore/**"
            - "ci/**"
            - "feature/**"
            - "fix/**"
    workflow_dispatch:

permissions:
    checks: write
    contents: read
    pull-requests: write
    statuses: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    pre-commit:
        name: Pre-commit checks
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.14"
                  cache: pip

            - uses: pre-commit/action@v3.0.1
            env:
              SKIP: no-commit-to-branch

    ruff:
        name: Ruff lint
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6

            - uses: chrysa/github-actions/python-setup@v1
              with:
                  python-version: "3.14"

            - uses: chrysa/github-actions/ruff-check@v1
              with:
                  python-version: "3.14"
                  latest-python: "3.14"
                  sources: .

    mypy:
        name: Mypy type check
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6

            - uses: chrysa/github-actions/tool-setup@v1
              with:
                  python-version: "3.14"
                  extras: "dev"

            - uses: chrysa/github-actions/mypy-check@v1
              with:
                  python-version: "3.14"
                  latest-python: "3.14"
                  sources: .

    tests:
        name: Tests & Coverage
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.14"
                  cache: pip

            - name: Install dependencies
              run: |
                  pip install --only-binary :all: --upgrade pip setuptools wheel
                  pip install ebookmeta==1.2.11 progress==1.6.1
                  pip install --only-binary :all: "pytest>=8.0" "pytest-cov>=5.0"

            - name: Run tests with coverage
              run: |
                  mkdir -p reports
                  pytest \
                    --cov=common \
                    --cov-branch \
                    --cov-report=xml:reports/coverage.xml \
                    --cov-report=term-missing \
                    --junitxml=reports/junit.xml \
                    -v

            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: test-results-3.14
                  path: reports/

    build:
        name: Build Windows executable
        runs-on: windows-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.14"

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Build with PyInstaller
              run: pyinstaller --onefile --noconsole main.py --name epub-sorter

            - uses: actions/upload-artifact@v7
              with:
                  name: epub-sorter-windows
                  path: dist/epub-sorter.exe
                  retention-days: 7
