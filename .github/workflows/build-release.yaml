---
name: build exe and release
on:
  push:
    branches:
      - main
    paths:
      - '**.py'
  workflow_dispatch:
jobs:
  build-on-windows:
    runs-on: windows-latest

    strategy:
      matrix:
        python-version: [3.10]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with pyinstaller
      run: |
        pyinstaller --onefile --noconsole main.py --name "epub-sorter"

    - uses: actions/upload-artifact@v2
      with:
        name: e_opub_order_windows
        path: .\dist\e_opub_order.exe

  create-release:
    runs-on: ubuntu-latest
    needs:
      - build-on-windows

    steps:
    - uses: actions/download-artifact@v2
      with:
        path: ./
    - name: Create github release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release Version ${{ github.run_number }}
        draft: false
        prerelease: false

    - name: Upload windows artifact to github release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./epub-sorter*epub-sorter.exe
        asset_name: e_opub_order_windows.exe
        asset_content_type: application
